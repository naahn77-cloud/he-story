<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>He_Story: Circular Time Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f19; /* BG_COLOR */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="timeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('timeCanvas');
        const ctx = canvas.getContext('2d');

        // 설정 값 정의
        const COLORS = {
            bg: '#0f0f19',
            track: '#28283c',
            text: '#ffffff',
            offNode: '#1e1e32',
            offText: '#646478',
            highlight: {
                sec: '#00ffff',
                min: '#00c896',
                hr: '#ffa500',
                day: '#ff6464',
                month: '#b464ff'
            }
        };

        function resize() {
            const size = Math.min(window.innerWidth, window.innerHeight);
            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        function getPos(centerX, centerY, radius, angleDeg) {
            const angleRad = (angleDeg - 90) * Math.PI / 180;
            return {
                x: centerX + radius * Math.cos(angleRad),
                y: centerY + radius * Math.sin(angleRad)
            };
        }

        function drawOrbit(centerX, centerY, name, currentVal, totalVal, radius, dotSize, color) {
            // 궤적 라인
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = COLORS.track;
            ctx.lineWidth = 1;
            ctx.stroke();

            for (let i = 0; i < totalVal; i++) {
                const displayNum = (name === 'sec' || name === 'min' || name === 'hr') ? i : i + 1;
                const angle = (360 / totalVal) * i;
                const pos = getPos(centerX, centerY, radius, angle);

                let nodeCol, txtCol, currentDotSize = dotSize;

                if (i < currentVal) {
                    nodeCol = color;
                    txtCol = COLORS.bg; // 밝은 배경엔 어두운 글씨 (반전)
                } else if (i === currentVal) {
                    nodeCol = COLORS.text;
                    txtCol = COLORS.bg;
                    currentDotSize = dotSize + 2;
                } else {
                    nodeCol = COLORS.offNode;
                    txtCol = COLORS.offText;
                }

                // 노드 그리기
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, currentDotSize, 0, Math.PI * 2);
                ctx.fillStyle = nodeCol;
                ctx.fill();

                // 숫자 그리기
                ctx.fillStyle = txtCol;
                ctx.font = `bold ${currentDotSize * 0.9}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(displayNum, pos.x, pos.y);
            }
        }

        function render() {
            const rectSize = Math.min(window.innerWidth, window.innerHeight);
            const center = { x: rectSize / 2, y: rectSize / 2 };
            const now = new Date();

            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, rectSize, rectSize);

            // 반지름 및 노드 크기 반응형 계산
            const bU = rectSize / 1000; 
            const orbits = [
                { name: 'month', curr: now.getMonth(),       total: 12, rad: bU * 110, size: bU * 20, col: COLORS.highlight.month },
                { name: 'day',   curr: now.getDate() - 1,    total: 30, rad: bU * 200, size: bU * 15, col: COLORS.highlight.day },
                { name: 'hr',    curr: now.getHours(),       total: 24, rad: bU * 290, size: bU * 13, col: COLORS.highlight.hr },
                { name: 'min',   curr: now.getMinutes(),     total: 60, rad: bU * 380, size: bU * 11, col: COLORS.highlight.min },
                { name: 'sec',   curr: now.getSeconds(),     total: 60, rad: bU * 460, size: bU * 10, col: COLORS.highlight.sec }
            ];

            orbits.forEach(o => {
                drawOrbit(center.x, center.y, o.name, o.curr, o.total, o.rad, o.size, o.col);
            });

            // 중앙 텍스트 (Year & Time)
            ctx.fillStyle = COLORS.text;
            ctx.font = `bold ${bU * 45}px Arial`;
            ctx.fillText(now.getFullYear(), center.x, center.y - (bU * 10));
            
            ctx.fillStyle = '#c8c8c8';
            ctx.font = `bold ${bU * 22}px Arial`;
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            ctx.fillText(timeStr, center.x, center.y + (bU * 28));

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
